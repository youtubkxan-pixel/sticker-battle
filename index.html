<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏆 STICKER BATTLE ROYALE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#050D1A;color:#fff;
  font-family:'Rajdhani',sans-serif;
  user-select:none;-webkit-user-select:none;
  touch-action:manipulation
}
#root{
  position:relative;width:100%;height:100dvh;
  display:flex;flex-direction:column;overflow:hidden;
  background:radial-gradient(ellipse 140% 90% at 50% 20%,#0A1628 0%,#050D1A 70%)
}

/* TOP */
#top{
  display:flex;align-items:flex-start;gap:7px;
  padding:7px 7px 4px;flex-shrink:0;height:152px
}
#cam{
  position:relative;width:47%;height:100%;
  border-radius:8px;overflow:hidden;
  border:1.5px solid rgba(0,200,255,.2);
  background:#07101e;flex-shrink:0;
  display:flex;align-items:center;justify-content:center
}
#ad-slot{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.15);
  font-family:'Orbitron',monospace;font-size:.52rem;
  letter-spacing:2px;text-align:center
}
.live-badge{
  position:absolute;top:6px;left:6px;
  background:#E50000;color:#fff;
  font-family:'Orbitron',monospace;font-size:.44rem;
  font-weight:700;letter-spacing:1px;
  padding:2px 7px;border-radius:3px;
  display:flex;align-items:center;gap:3px;
  animation:liveBlink 1.4s ease-in-out infinite
}
.live-dot{width:5px;height:5px;border-radius:50%;background:#fff;flex-shrink:0;animation:liveBlink .7s ease-in-out infinite alternate}
@keyframes liveBlink{0%,100%{opacity:1}50%{opacity:.55}}
.cam-label{position:absolute;bottom:5px;left:7px;font-family:'Orbitron',monospace;font-size:.46rem;letter-spacing:1px;color:rgba(255,255,255,.5)}

#winners{
  flex:1;height:100%;
  border-radius:8px;
  background:rgba(8,18,40,.9);
  border:1px solid rgba(0,200,255,.2);
  padding:7px 8px;
  display:flex;flex-direction:column;gap:3px;overflow:hidden
}
.win-ttl{font-family:'Orbitron',monospace;font-size:.56rem;letter-spacing:2px;color:#00CFFF;text-align:center;border-bottom:1px solid rgba(0,200,255,.15);padding-bottom:4px;margin-bottom:2px}
.win-row{display:flex;align-items:center;gap:5px;padding:1px 0}
.win-rk{font-family:'Orbitron',monospace;font-size:.54rem;color:rgba(255,255,255,.4);width:12px}
.win-em{font-size:1.05rem;line-height:1}
.win-nm{flex:1;font-weight:700;font-size:.62rem;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.win-ct{font-family:'Orbitron',monospace;font-size:.54rem;color:#FFD700;white-space:nowrap}

/* LEADER */
#leader{
  flex-shrink:0;display:flex;align-items:center;gap:5px;
  padding:3px 10px;
  background:rgba(0,0,0,.35);
  border-top:1px solid rgba(0,200,255,.08);
  border-bottom:1px solid rgba(0,200,255,.08)
}
.ldot{width:7px;height:7px;border-radius:50%;background:#00FF88;box-shadow:0 0 6px #00FF88;animation:ldotA .8s ease-in-out infinite alternate}
@keyframes ldotA{from{opacity:.35}to{opacity:1}}
#l-em{font-size:1.05rem}
#l-nm{font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:1px;color:#FFD700;font-weight:700}
#l-vt{margin-left:auto;font-family:'Orbitron',monospace;font-size:.54rem;color:rgba(255,255,255,.45)}
.yt-st{font-family:'Orbitron',monospace;font-size:.46rem;letter-spacing:1px;padding:2px 7px;border-radius:3px;transition:all .3s}
.yt-st.on {color:#00FF88;border:1px solid rgba(0,255,136,.3);background:rgba(0,255,136,.07)}
.yt-st.off{color:#FF2D78;border:1px solid rgba(255,45,120,.3);background:rgba(255,45,120,.07)}
.yt-st.wait{color:#FFD700;border:1px solid rgba(255,215,0,.3);background:rgba(255,215,0,.07);animation:liveBlink .8s ease-in-out infinite alternate}

/* ARENA */
#arena-outer{
  flex:1 1 0;width:100%;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;min-height:0
}
#arena-wrap{position:relative;flex-shrink:0}
#arena-ring{
  position:absolute;inset:0;border-radius:50%;
  border:2.5px dashed rgba(0,210,255,.38);
  animation:ringRot 35s linear infinite;pointer-events:none;z-index:2
}
@keyframes ringRot{to{transform:rotate(360deg)}}
#arena-ring2{position:absolute;inset:5px;border-radius:50%;border:1px solid rgba(0,210,255,.1);pointer-events:none;z-index:2}
#arena-bg{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 50% 44%,rgba(0,80,180,.1) 0%,rgba(0,40,100,.05) 40%,rgba(5,13,26,.98) 68%);
  pointer-events:none
}

/* FIGHTERS */
.snode{
  position:absolute;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;
  pointer-events:none;z-index:5;will-change:left,top
}
.s-ball{
  position:relative;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.18) 0%,rgba(255,255,255,.04) 45%,rgba(0,0,0,.25) 100%);
  box-shadow:0 3px 10px rgba(0,0,0,.65),inset 0 1px 2px rgba(255,255,255,.18)
}
.s-em{font-size:clamp(1.1rem,2.6vw,1.75rem);line-height:1;filter:drop-shadow(0 1px 3px rgba(0,0,0,.55))}
.s-vt{font-family:'Orbitron',monospace;font-size:clamp(.3rem,.65vw,.48rem);color:#FFD700;font-weight:700;line-height:1;margin-top:1px;text-shadow:0 1px 3px rgba(0,0,0,.9)}
.snode.leader .s-ball{box-shadow:0 0 0 2px rgba(255,215,0,.55),0 0 14px rgba(255,215,0,.45),0 3px 10px rgba(0,0,0,.65)}
.snode.leader .s-vt{color:gold}
.snode.danger .s-ball{box-shadow:0 0 0 1.5px rgba(255,100,100,.3),0 0 8px rgba(255,60,60,.18),0 3px 10px rgba(0,0,0,.65);animation:dangerFade .5s ease-in-out infinite alternate}
@keyframes dangerFade{from{opacity:.65}to{opacity:1}}
.snode.danger .s-vt{color:#FF6060}
.snode.hit .s-ball{animation:hitF .11s ease-out}
@keyframes hitF{0%{box-shadow:0 0 0 4px rgba(255,255,255,.8),0 0 22px rgba(255,255,255,.5)}100%{box-shadow:0 3px 10px rgba(0,0,0,.65)}}
.snode.out{animation:elimA .85s ease-in forwards!important;z-index:4}
@keyframes elimA{
  0%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:1}
  12%{transform:translate(-50%,-50%) scale(1.45) rotate(-8deg);opacity:1}
  100%{transform:translate(-50%,350px) scale(.008) rotate(32deg);opacity:0}
}
.vburst{position:absolute;pointer-events:none;z-index:20;font-family:'Orbitron',monospace;font-size:.68rem;color:#00FF88;text-shadow:0 0 8px #00FF88;animation:vbA .72s ease-out forwards}
@keyframes vbA{0%{transform:translate(-50%,-50%) scale(1.5);opacity:1}100%{transform:translate(-50%,-185%) scale(.25);opacity:0}}
.joinfx{position:fixed;top:44%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:100;font-family:'Orbitron',monospace;font-size:.95rem;color:#FFD700;text-shadow:0 0 22px #FFD700;animation:joinA .9s ease-out forwards;text-align:center;white-space:nowrap}
@keyframes joinA{0%{transform:translate(-50%,-50%) scale(.18) rotate(-14deg);opacity:1}55%{transform:translate(-50%,-50%) scale(1.15) rotate(1deg);opacity:1}100%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:0}}

/* ROUND BAR */
#round-bar{flex-shrink:0;display:flex;align-items:center;gap:4px;padding:3px 8px;background:rgba(0,0,0,.5);border-top:1px solid rgba(255,255,255,.04)}
.rb{font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:1.5px;padding:2px 7px;border-radius:3px;white-space:nowrap}
.rb-rnd{color:#FFD700;background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.22)}
.rb-phase{color:#FF6B00;background:rgba(255,107,0,.07);border:1px solid rgba(255,107,0,.25);animation:fG .9s ease-in-out infinite alternate}
.rb-phase.brk{color:#00CFFF;background:rgba(0,200,255,.06);border:1px solid rgba(0,200,255,.2);animation:none}
@keyframes fG{from{box-shadow:none}to{box-shadow:0 0 8px rgba(255,107,0,.4)}}
.rb-timer{color:rgba(255,255,255,.5);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1)}
.rb-alive{color:#00FF88;background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.22);margin-left:auto}

/* ELIMINATED */
#elim-sec{flex-shrink:0;padding:4px 8px 3px;background:rgba(0,0,0,.45);border-top:1px solid rgba(255,45,120,.12)}
.elim-ttl{font-family:'Orbitron',monospace;font-size:.46rem;letter-spacing:2px;color:#FF2D78;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.e-dot{width:5px;height:5px;border-radius:50%;background:#FF2D78;flex-shrink:0}
#elim-scroll{display:flex;gap:3px;overflow-x:auto;padding-bottom:1px;scrollbar-width:none;-ms-overflow-style:none}
#elim-scroll::-webkit-scrollbar{display:none}
.e-item{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.1) 0%,rgba(0,0,0,.4) 100%);border:1px solid rgba(255,45,120,.25);display:flex;align-items:center;justify-content:center;font-size:.9rem;opacity:.65;position:relative}
.e-item::after{content:'✕';position:absolute;font-size:.42rem;color:rgba(255,45,120,.85);bottom:-1px;right:-1px;background:#050D1A;border-radius:50%;width:10px;height:10px;line-height:10px;text-align:center}

/* WIN */
#wscreen{display:none;position:fixed;inset:0;background:rgba(5,13,26,.97);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:10px}
#wscreen.on{display:flex}
.cf-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.cfp{position:absolute;top:-20px;animation:cfF linear infinite}
@keyframes cfF{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:.2}}
.w-trophy{font-size:3rem;animation:trS 2s ease-in-out infinite}
@keyframes trS{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.1) rotate(5deg)}}
.w-title{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(1.6rem,5vw,2.5rem);letter-spacing:6px;background:linear-gradient(135deg,#FFD700,#FF6B00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.w-em{font-size:clamp(4rem,12vw,6rem);animation:wP 1.5s ease-in-out infinite}
@keyframes wP{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.w-nm{font-family:'Orbitron',monospace;font-weight:700;font-size:clamp(1.1rem,3.5vw,1.8rem);letter-spacing:4px;color:gold;text-shadow:0 0 30px gold}
.w-vt{color:rgba(255,255,255,.4);font-size:.82rem;font-weight:700}
.w-cta{font-family:'Orbitron',monospace;font-size:.68rem;letter-spacing:2px;color:#00CFFF;background:rgba(0,200,255,.08);border:1px solid rgba(0,200,255,.3);padding:6px 16px;border-radius:5px;animation:ctaG 1.5s ease-in-out infinite;text-align:center}
@keyframes ctaG{0%,100%{box-shadow:none}50%{box-shadow:0 0 18px rgba(0,200,255,.5)}}
.w-next{font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:2px;color:rgba(255,255,255,.25)}

/* TOAST & MS */
#toast{position:fixed;top:8px;left:50%;transform:translateX(-50%) translateY(-60px);background:rgba(5,13,26,.97);border:1px solid #00CFFF;border-radius:5px;padding:5px 14px;font-weight:700;font-size:.63rem;color:#00CFFF;z-index:500;white-space:nowrap;pointer-events:none;transition:transform .28s cubic-bezier(.34,1.56,.64,1)}
#toast.on{transform:translateX(-50%) translateY(0)}
.ms-banner{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(70px);background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,107,0,.1));border:1px solid rgba(255,215,0,.4);border-radius:6px;padding:6px 18px;font-family:'Orbitron',monospace;font-size:.72rem;letter-spacing:2px;color:#FFD700;z-index:60;white-space:nowrap;transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.ms-banner.on{transform:translateX(-50%) translateY(0)}

/* FX */
.pt{position:fixed;border-radius:50%;pointer-events:none;z-index:999;animation:ptF .6s ease-out forwards}
@keyframes ptF{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
#hflash{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0;transition:opacity .08s}
#hflash.on{opacity:1}
</style>
</head>
<body>
<div id="root">

  <div id="top">
    <!-- REKLAMA JOYI -->
    <div id="cam">
      <div id="ad-slot">AD SPACE</div>
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <div class="cam-label">STICKER BATTLE</div>
    </div>

    <div id="winners">
      <div class="win-ttl">TOP WINNERS</div>
      <div id="winners-list">
        <div class="win-row">
          <span class="win-rk">1</span>
          <span class="win-em">—</span>
          <span class="win-nm" style="color:rgba(255,255,255,.3)">No winner yet</span>
        </div>
      </div>
    </div>
  </div>

  <div id="leader">
    <div class="ldot"></div>
    <span id="l-em">—</span>
    <span id="l-nm">WAITING...</span>
    <span id="l-vt">0 votes</span>
    <div class="yt-st wait" id="yt-badge">🔄 CONNECTING</div>
  </div>

  <div id="arena-outer">
    <div id="arena-wrap">
      <div id="arena-bg"></div>
      <div id="arena-ring"></div>
      <div id="arena-ring2"></div>
    </div>
  </div>

  <div id="round-bar">
    <div class="rb rb-rnd"   id="t-round">ROUND 1</div>
    <div class="rb rb-phase" id="t-phase">⚔ BATTLE</div>
    <div class="rb rb-timer" id="t-timer">1:00</div>
    <div class="rb rb-alive" id="t-alive">🟢 20</div>
  </div>

  <div id="elim-sec">
    <div class="elim-ttl"><div class="e-dot"></div>ELIMINATED</div>
    <div id="elim-scroll"></div>
  </div>

</div>

<div id="wscreen">
  <div class="cf-wrap" id="cf"></div>
  <div class="w-trophy">🏆</div>
  <div class="w-title">CHAMPION!</div>
  <div class="w-em" id="w-em">🎉</div>
  <div class="w-nm" id="w-nm">—</div>
  <div class="w-vt" id="w-vt">0 votes</div>
  <div class="w-cta">🎭 SEND STICKER FOR NEXT ROUND!</div>
  <div class="w-next" id="w-next">Next round in 5…</div>
</div>

<div id="hflash"></div>
<div id="toast"></div>
<div class="ms-banner" id="ms">🎉 Amazing!</div>

<script src="/socket.io/socket.io.js"></script>
<script>
'use strict';

const STICKERS=[
  {e:'😂',n:'LOL'},{e:'😍',n:'Love'},{e:'🔥',n:'Fire'},
  {e:'💀',n:'Skull'},{e:'👻',n:'Ghost'},{e:'🤖',n:'Robot'},
  {e:'👑',n:'King'},{e:'🦁',n:'Lion'},{e:'🐯',n:'Tiger'},
  {e:'🐺',n:'Wolf'},{e:'🦊',n:'Fox'},{e:'🐉',n:'Dragon'},
  {e:'🦄',n:'Unicorn'},{e:'🚀',n:'Rocket'},{e:'💎',n:'Diamond'},
  {e:'⚡',n:'Thunder'},{e:'🌟',n:'Star'},{e:'🎯',n:'Target'},
  {e:'🏆',n:'Trophy'},{e:'🤩',n:'StarFace'}
];
const EXTRA={
  '😀':'Grin','😎':'Cool','🥳':'Party','🤠':'Cowboy','🎃':'Pumpkin',
  '🐱':'Cat','🐶':'Dog','🐸':'Frog','🐻':'Bear','👽':'Alien',
  '🎮':'Gamer','💪':'Strong','🍕':'Pizza','🌈':'Rainbow','🦋':'Butterfly',
  '❤️':'Heart','💯':'100','🎵':'Music','😱':'Shock','🤯':'Mindblown',
};

/* ══ CONFIG ══ */
const ROUND_S   = 60;   // Aniq 60 soniya
const WIN_AUTO  = 5;    // G'olibdan keyin 5 soniyada keyingi raunt
const MAX_ARENA = 20;
const BASE_SPEED= 1.4;
const BALL_R    = 22;

/* ══════════════════════════════════════════════
   ELIM INTERVAL HISOBLASH
   ──────────────────────────────────────────────
   60 soniya ichida barcha stikerlar (alive-1) 
   chiqarilishi kerak:
     interval = floor(60 / (alive - 1))
   
   Misollar:
     20 stiker → 60/19 ≈ 3 soniya
     10 stiker → 60/9  ≈ 6 soniya (max 5 da cheklanadi)
     60 stiker → 60/59 ≈ 1 soniya
   
   Min: 1 soniya  |  Max: 5 soniya
══════════════════════════════════════════════ */
function calcInterval(){
  const alive = fighters.filter(f=>f.alive).length;
  if(alive <= 1) return 999;
  const interval = Math.floor(ROUND_S / Math.max(1, alive - 1));
  return Math.max(1, Math.min(5, interval));
}

/* ══ STATE ══ */
let fighters=[],eliminated=[],allWinners=[];
let gameNum=0, phase='idle';
let elimClock=1, roundLeft=ROUND_S, winLeft=WIN_AUTO;
let _tick=null, _raf=null, aR=0, CX=0, CY=0;
let _fq={}, _totalVotes=0, _fid=0;
const MS_LVLS=[10,25,50,100,200,500]; let _msIdx=0;

/* ══ EMOJI UTILS ══ */
const _seg=(typeof Intl!=='undefined'&&Intl.Segmenter)?new Intl.Segmenter([],{granularity:'grapheme'}):null;
function graphemes(s){return _seg?[..._seg.segment(s)].map(x=>x.segment):[...s]}
function norm(s){return(s||'').replace(/\uFE0F/g,'').replace(/\u20E3/g,'').trim()}
function firstEmoji(s){
  for(const g of graphemes(s)){
    const cp=g.codePointAt(0);
    if(!cp||cp<=127)continue;
    if(cp>=0x1F300||(cp>=0x2600&&cp<=0x27BF))return g;
  }
  return null;
}
function emojiName(e){
  const f=STICKERS.find(x=>norm(x.e)===norm(e));
  if(f)return f.n;
  return EXTRA[e]||EXTRA[norm(e)]||'Fighter';
}

/* ══ ARENA SIZE ══ */
function sizeArena(){
  const o=document.getElementById('arena-outer');
  const w=document.getElementById('arena-wrap');
  const r=o.getBoundingClientRect();
  const s=Math.min(r.width,r.height)-4;
  w.style.width=s+'px'; w.style.height=s+'px';
  aR=s/2-8; CX=s/2; CY=s/2;
}
function ballSize(){return Math.max(26,Math.min(42,aR*.13));}

/* ══ INIT ══ */
function initGame(){
  sizeArena();
  fighters=[]; eliminated=[]; _fid=0; _totalVotes=0; _msIdx=0; _fq={};
  gameNum++; roundLeft=ROUND_S; elimClock=1; phase='game';

  const chosen=[...STICKERS].sort(()=>Math.random()-.5);
  chosen.forEach((s,i)=>{
    const ang=(i/chosen.length)*Math.PI*2+(Math.random()-.5)*.22;
    const r=aR*(0.18+(i%4)*0.14+Math.random()*.08);
    const dir=Math.random()*Math.PI*2;
    const spd=BASE_SPEED*(0.85+Math.random()*.3);
    fighters.push({id:`f${_fid++}`,e:s.e,n:s.n,votes:0,alive:true,
      x:CX+r*Math.cos(ang),y:CY+r*Math.sin(ang),
      vx:Math.cos(dir)*spd,vy:Math.sin(dir)*spd});
  });

  document.getElementById('t-round').textContent=`ROUND ${gameNum}`;
  document.getElementById('t-timer').textContent='1:00';
  setPhase('game');
  document.querySelectorAll('.snode,.vburst,.joinfx').forEach(e=>e.remove());
  document.getElementById('elim-scroll').innerHTML='';

  fighters.forEach(mkNode);
  updAlive(); updLeader();
  clearInterval(_tick); _tick=setInterval(tick,1000);
  cancelAnimationFrame(_raf); loop();
  startBg();
}

/* ══ NODE ══ */
function mkNode(f){
  const wrap=document.getElementById('arena-wrap');
  const bs=ballSize();
  const el=document.createElement('div');
  el.className='snode'; el.id=`n-${f.id}`;
  el.innerHTML=`<div class="s-ball" style="width:${bs}px;height:${bs}px"><span class="s-em">${f.e}</span></div><span class="s-vt">—</span>`;
  el.style.left=f.x+'px'; el.style.top=f.y+'px';
  wrap.appendChild(el);
}

/* ══ PHYSICS ══ */
function loop(){
  if(phase==='game'){
    const alive=fighters.filter(f=>f.alive);
    const bs=ballSize(); const R=bs/2+2;
    for(const f of alive){
      f.x+=f.vx; f.y+=f.vy;
      const dx=f.x-CX,dy=f.y-CY,d=Math.sqrt(dx*dx+dy*dy);
      if(d+R>aR){const nx=dx/d,ny=dy/d,dot=f.vx*nx+f.vy*ny;if(dot>0){f.vx-=2*dot*nx;f.vy-=2*dot*ny;}const ov=d+R-aR;f.x-=nx*ov;f.y-=ny*ov;}
    }
    const md=R*2;
    for(let i=0;i<alive.length;i++){
      for(let j=i+1;j<alive.length;j++){
        const a=alive[i],b=alive[j];
        const dx=b.x-a.x,dy=b.y-a.y,d2=dx*dx+dy*dy;
        if(d2<md*md&&d2>.01){
          const d=Math.sqrt(d2),nx=dx/d,ny=dy/d;
          const p=(a.vx-b.vx)*nx+(a.vy-b.vy)*ny;
          if(p>0){a.vx-=p*nx;a.vy-=p*ny;b.vx+=p*nx;b.vy+=p*ny;flashHit(a.id);flashHit(b.id);}
          const ov=(md-d)/2;a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;
        }
      }
    }
    for(const f of alive){
      const sp=Math.sqrt(f.vx*f.vx+f.vy*f.vy);
      if(sp<BASE_SPEED*.42){const sc=BASE_SPEED*.62/(sp||1);f.vx*=sc;f.vy*=sc;}
      const el=document.getElementById(`n-${f.id}`);
      if(el&&!el.classList.contains('out')){el.style.left=f.x+'px';el.style.top=f.y+'px';}
    }
    refreshNodes(alive);
  }
  _raf=requestAnimationFrame(loop);
}
function flashHit(id){
  if(_fq[id])return;_fq[id]=true;
  const el=document.getElementById(`n-${id}`);
  if(el){el.classList.add('hit');setTimeout(()=>{el.classList.remove('hit');delete _fq[id];},112);}
}
function refreshNodes(alive){
  if(!alive.length)return;
  const maxV=Math.max(...alive.map(f=>f.votes));
  const minV=Math.min(...alive.map(f=>f.votes));
  for(const f of alive){
    const el=document.getElementById(`n-${f.id}`);
    if(!el||el.classList.contains('out'))continue;
    el.classList.toggle('leader',f.votes===maxV&&f.votes>0);
    el.classList.toggle('danger',f.votes===minV&&alive.length>1);
    el.querySelector('.s-vt').textContent=f.votes>0?`${f.votes}▲`:'—';
  }
}

/* ══════════════════════════════════════════════
   TICK — 1 soniyada 1 marta chaqiriladi
   
   Timer: roundLeft 60 → 0 (hech qachon manfiy bo'lmaydi)
   Elim:  elimClock har soniyada 1 ga kamayadi
          0 ga yetganda → 1 ta stiker chiqariladi
          elimClock qayta calcInterval() ga o'rnatiladi
══════════════════════════════════════════════ */
function tick(){
  if(phase==='game'){
    roundLeft--;
    elimClock--;

    // Timer display — 0 dan pastga tushmasin
    const safe=Math.max(0,roundLeft);
    const m=Math.floor(safe/60), s=safe%60;
    document.getElementById('t-timer').textContent=`${m}:${s<10?'0'+s:s}`;

    if(roundLeft>0&&roundLeft<=5) sfx('warn');

    // Stiker chiqarish
    if(elimClock<=0){
      const alive=fighters.filter(f=>f.alive);
      if(alive.length>1){
        const minV=Math.min(...alive.map(f=>f.votes));
        const pool=alive.filter(f=>f.votes===minV);
        elim(pool[Math.floor(Math.random()*pool.length)]);
      }
      // Keyingi interval — yangi alive soniga qarab
      elimClock=calcInterval();
    }

    updAlive(); updLeader();

    // Raunt tugash sharti: vaqt tugadi YOKI 1 ta qoldi
    const alive=fighters.filter(f=>f.alive);
    if(roundLeft<=0||alive.length<=1){
      clearInterval(_tick); _tick=null;
      const winner=alive[0]||fighters.slice().sort((a,b)=>b.votes-a.votes)[0];
      setTimeout(()=>showWin(winner),800);
    }

  } else if(phase==='winwait'){
    winLeft--;
    document.getElementById('w-next').textContent=`Next round in ${winLeft}…`;
    if(winLeft<=0){
      document.getElementById('wscreen').classList.remove('on');
      document.getElementById('cf').innerHTML='';
      document.querySelectorAll('.snode,.vburst,.joinfx').forEach(e=>e.remove());
      initGame();
    }
  }
}

/* ══ ELIM ══ */
function elim(f){
  f.alive=false; sfx('elim');
  eliminated.push(f);
  const scroll=document.getElementById('elim-scroll');
  const item=document.createElement('div');
  item.className='e-item'; item.title=f.n; item.textContent=f.e;
  scroll.appendChild(item);
  setTimeout(()=>{scroll.scrollLeft=scroll.scrollWidth;},50);
  const el=document.getElementById(`n-${f.id}`);
  if(el){spawnPts(el);el.classList.add('out');setTimeout(()=>el.remove(),900);}
  toast(`💥 ${f.e} ${f.n} eliminated!`);
  updAlive();
}

/* ══ WIN ══ */
function showWin(f){
  if(!f)return;
  cancelAnimationFrame(_raf); _raf=null; sfx('win');
  allWinners.unshift({e:f.e,n:f.n,votes:f.votes});
  if(allWinners.length>3)allWinners=allWinners.slice(0,3);
  updWinners();
  document.getElementById('w-em').textContent=f.e;
  document.getElementById('w-nm').textContent=f.n.toUpperCase();
  document.getElementById('w-vt').textContent=`${f.votes} votes — CHAMPION!`;
  winLeft=WIN_AUTO;
  document.getElementById('w-next').textContent=`Next round in ${winLeft}…`;
  document.getElementById('wscreen').classList.add('on');
  spawnConfetti(); phase='winwait';
  clearInterval(_tick); _tick=setInterval(tick,1000);
}
function updWinners(){
  const list=document.getElementById('winners-list');
  if(!allWinners.length)return;
  list.innerHTML=allWinners.map((w,i)=>`
    <div class="win-row">
      <span class="win-rk">${i+1}</span>
      <span class="win-em">${w.e}</span>
      <span class="win-nm">${w.n}</span>
      <span class="win-ct">${w.votes}V</span>
    </div>`).join('');
}

/* ══ VOTE — FAQAT EMOJI ══ */
function vote(raw){
  if(phase!=='game')return;
  if(!raw||!raw.trim())return;
  const emoji=firstEmoji(raw);
  if(!emoji)return;
  _totalVotes++;
  const match=findF(emoji,true);
  if(match){
    match.votes++; sfx('vote'); voteBurst(match);
    toast(`${match.e} +1 (${match.votes} votes)`);
  } else {
    const dead=findF(emoji,false);
    if(dead){toast(`❌ ${dead.e} eliminated!`);return;}
    if(fighters.filter(f=>f.alive).length<MAX_ARENA){
      const nf=addFighter(emoji);
      if(nf){nf.votes++;toast(`🆕 ${emoji} ${nf.n} ENTERED!`);}
    } else {
      toast('⚠️ Arena full!');
    }
  }
  checkMs(); updLeader();
}
function findF(emoji,aliveOnly){
  const pool=aliveOnly?fighters.filter(f=>f.alive):fighters;
  const n=norm(emoji);
  return pool.find(f=>norm(f.e)===n||f.e===emoji)||null;
}
function addFighter(emoji){
  if(fighters.filter(f=>f.alive).length>=MAX_ARENA)return null;
  if(findF(emoji,false))return null;
  const id=`f${_fid++}`,name=emojiName(emoji);
  const ang=Math.random()*Math.PI*2,r=aR*(0.2+Math.random()*.45);
  const dir=Math.random()*Math.PI*2,spd=BASE_SPEED*(0.85+Math.random()*.3);
  const f={id,e:emoji,n:name,votes:0,alive:true,
    x:CX+r*Math.cos(ang),y:CY+r*Math.sin(ang),
    vx:Math.cos(dir)*spd,vy:Math.sin(dir)*spd};
  fighters.push(f); mkNode(f); sfx('join');
  const b=document.createElement('div');b.className='joinfx';
  b.textContent=`${emoji} ${name.toUpperCase()} ENTERED!`;
  document.body.appendChild(b); setTimeout(()=>b.remove(),1000);
  updAlive(); return f;
}

/* ══ UI ══ */
function updAlive(){document.getElementById('t-alive').textContent=`🟢 ${fighters.filter(f=>f.alive).length}`;}
function updLeader(){
  const alive=fighters.filter(f=>f.alive).sort((a,b)=>b.votes-a.votes);
  const top=alive[0];
  if(top&&top.votes>0){
    document.getElementById('l-em').textContent=top.e;
    document.getElementById('l-nm').textContent=top.n.toUpperCase();
    document.getElementById('l-vt').textContent=`${top.votes} votes`;
  } else {
    document.getElementById('l-em').textContent='—';
    document.getElementById('l-nm').textContent='WAITING...';
    document.getElementById('l-vt').textContent='0 votes';
  }
}
function setPhase(p){
  const el=document.getElementById('t-phase');
  if(p==='game'){el.textContent='⚔ BATTLE';el.className='rb rb-phase';}
  else{el.textContent='⏸ BREAK';el.className='rb rb-phase brk';}
}

/* ══ SOCKET ══ */
function connectSocket(){
  const badge=document.getElementById('yt-badge');
  if(typeof io==='undefined'){badge.textContent='⚠️ NO SERVER';badge.className='yt-st off';return;}
  const socket=io({transports:['websocket','polling'],reconnection:true,reconnectionDelay:2000,reconnectionAttempts:Infinity});
  socket.on('connect',()=>{badge.textContent='🟢 YT LIVE';badge.className='yt-st on';});
  socket.on('disconnect',()=>{badge.textContent='🔄 RECONNECTING';badge.className='yt-st wait';});
  socket.on('yt_status',data=>{
    const s=data.status;
    if(s==='CONNECTED'){badge.textContent='🟢 YT LIVE';badge.className='yt-st on';toast('✅ YouTube ulandi!');}
    else if(s==='CONNECTING'){badge.textContent='🔄 CONNECTING';badge.className='yt-st wait';}
    else if(s==='ERROR'){badge.textContent='⚠️ XATO';badge.className='yt-st off';}
    else if(s==='NOT_LIVE'){badge.textContent='⏸ NOT LIVE';badge.className='yt-st off';}
    else if(s==='NO_VIDEO_ID'){badge.textContent='⚠️ NO ID';badge.className='yt-st off';toast('⚠️ VIDEO_ID yo\'q!');}
    else if(s==='STREAM_ENDED'){badge.textContent='🏁 ENDED';badge.className='yt-st off';}
  });
  ['vote','chat','comment','message'].forEach(ev=>{
    socket.on(ev,data=>{
      const raw=data.emoji||data.text||data.message||data.comment||data.displayMessage||'';
      if(raw)vote(raw);
    });
  });
}

/* ══ AUDIO ══ */
let AC=null,bgInt=null,audioReady=false;
function initAudio(){if(audioReady)return;try{AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();audioReady=true;startBg();}catch(e){}}
function startBg(){
  if(bgInt||!AC)return;
  const comp=AC.createDynamicsCompressor();comp.threshold.value=-14;comp.ratio.value=4;comp.connect(AC.destination);
  const M=AC.createGain();M.gain.value=0.055;M.connect(comp);
  const B=60/132,E=B/2;
  const MEL=[659,E,784,E,880,B,784,E,659,E,587,E,659,E,784,B,587,B,698,E,784,E,880,B,698,E,784,E,659,E,523,E,440,B,523,B];
  const BAS=[130,B*2,196,B*2,174,B*2,220,B*2,130,B*2,174,B*2,196,B*2,110,B*2];
  let loopLen=0;for(let i=0;i<MEL.length;i+=2)loopLen+=MEL[i+1];
  let t0=AC.currentTime+0.05;
  function n(f,d,tp,vol,t){const o=AC.createOscillator(),g=AC.createGain();o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);g.gain.setValueAtTime(vol*.75,t+d*.55);g.gain.linearRampToValueAtTime(0,t+d*.9);o.connect(g);g.connect(M);o.start(t);o.stop(t+d);}
  function kk(t){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(155,t);o.frequency.exponentialRampToValueAtTime(40,t+0.09);g.gain.setValueAtTime(0.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.11);o.connect(g);g.connect(M);o.start(t);o.stop(t+0.12);}
  function hh(t,v){try{const buf=AC.createBuffer(1,AC.sampleRate*.04,AC.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*.8;const s=AC.createBufferSource(),g=AC.createGain();g.gain.value=v||.035;s.buffer=buf;s.connect(g);g.connect(M);s.start(t);}catch(e){}}
  function sched(){let t=t0;for(let i=0;i<MEL.length;i+=2){n(MEL[i],MEL[i+1],'square',.13,t);t+=MEL[i+1];}t=t0;for(let i=0;i<BAS.length;i+=2){n(BAS[i],BAS[i+1],'sine',.24,t);t+=BAS[i+1];}const bars=Math.ceil(loopLen/(B*4));for(let b=0;b<bars;b++){const bt=t0+b*B*4;kk(bt);kk(bt+B*2);hh(bt+B,.07);hh(bt+B*3,.07);for(let h=0;h<8;h++)hh(bt+h*E);}t0+=loopLen;}
  sched();bgInt=setInterval(sched,loopLen*1000);
}
function stopBg(){if(!bgInt)return;clearInterval(bgInt);bgInt=null;}
function sfx(type){
  if(!AC)return;
  try{
    if(type==='vote'){const o=AC.createOscillator(),g=AC.createGain();o.type='triangle';o.frequency.value=1300;g.gain.setValueAtTime(.04,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.055);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+.06);}
    if(type==='elim'){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(500,AC.currentTime);o.frequency.exponentialRampToValueAtTime(60,AC.currentTime+.18);g.gain.setValueAtTime(.3,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.2);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+.22);}
    if(type==='join'){const o=AC.createOscillator(),g=AC.createGain();o.type='square';o.frequency.setValueAtTime(440,AC.currentTime);o.frequency.exponentialRampToValueAtTime(880,AC.currentTime+.14);g.gain.setValueAtTime(.09,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.18);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+.2);}
    if(type==='warn'){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=440;g.gain.setValueAtTime(.1,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.1);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+.11);}
    if(type==='win'){stopBg();const M=AC.createGain();M.gain.value=.13;M.connect(AC.destination);[523,659,784,1047,1319].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.type='square';o.frequency.value=f;const t=AC.currentTime+i*.13;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.5,t+.04);g.gain.linearRampToValueAtTime(0,t+.13);o.connect(g);g.connect(M);o.start(t);o.stop(t+.15);});}
  }catch(e){}
}

/* ══ FX ══ */
function voteBurst(f){const wrap=document.getElementById('arena-wrap');const b=document.createElement('div');b.className='vburst';b.textContent='+1';b.style.left=f.x+'px';b.style.top=f.y+'px';wrap.appendChild(b);setTimeout(()=>b.remove(),780);}
function spawnPts(el){const r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;const cols=['#FF2D78','#FFD700','#FF6B00','#00CFFF','#00FF88'];for(let i=0;i<16;i++){const p=document.createElement('div');p.className='pt';const a=(i/16)*Math.PI*2,d=45+Math.random()*50;p.style.cssText=`left:${cx}px;top:${cy}px;width:6px;height:6px;background:${cols[i%5]}`;p.style.setProperty('--dx',`${Math.cos(a)*d}px`);p.style.setProperty('--dy',`${Math.sin(a)*d}px`);document.body.appendChild(p);setTimeout(()=>p.remove(),620);}}
function spawnConfetti(){const c=document.getElementById('cf');c.innerHTML='';const cols=['#FFD700','#FF6B00','#FF2D78','#00CFFF','#00FF88','#9B30FF','#fff'];for(let i=0;i<90;i++){const p=document.createElement('div');p.className='cfp';p.style.left=`${Math.random()*100}%`;p.style.background=cols[i%cols.length];p.style.borderRadius=Math.random()>.5?'50%':'3px';p.style.width=`${4+Math.random()*9}px`;p.style.height=`${4+Math.random()*9}px`;p.style.animationDuration=`${2+Math.random()*3}s`;p.style.animationDelay=`${Math.random()*2}s`;c.appendChild(p);}}
let _toastT=null;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(_toastT);_toastT=setTimeout(()=>el.classList.remove('on'),2200);}
let _msT=null;
function checkMs(){if(_msIdx>=MS_LVLS.length)return;if(_totalVotes>=MS_LVLS[_msIdx]){const el=document.getElementById('ms');el.textContent=`🎉 ${MS_LVLS[_msIdx]} votes — INCREDIBLE!`;el.classList.add('on');sfx('join');clearTimeout(_msT);_msT=setTimeout(()=>el.classList.remove('on'),3500);_msIdx++;}}

/* ══ BOOT ══ */
window.addEventListener('load',()=>{
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    initAudio(); initGame(); connectSocket();
  }));
});
['click','touchstart'].forEach(ev=>document.addEventListener(ev,()=>{if(!audioReady)initAudio();},{once:true}));
window.addEventListener('resize',()=>{
  sizeArena();
  fighters.forEach(f=>{const dx=f.x-CX,dy=f.y-CY,dist=Math.sqrt(dx*dx+dy*dy);if(dist>aR-BALL_R){const ang=Math.atan2(dy,dx);f.x=CX+Math.cos(ang)*(aR-BALL_R-4);f.y=CY+Math.sin(ang)*(aR-BALL_R-4);}});
});
</script>
