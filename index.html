<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏆 STICKER BATTLE ROYALE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#050D1A;color:#fff;
  font-family:'Rajdhani',sans-serif;
  user-select:none;-webkit-user-select:none;
  touch-action:manipulation
}

/* ══════════════════════════════
   FULL SCREEN 9:16 LAYOUT
══════════════════════════════ */
#root{
  position:relative;
  width:100%;height:100dvh;
  display:flex;flex-direction:column;
  overflow:hidden;
  /* Dark navy bg like the reference */
  background:radial-gradient(ellipse 120% 80% at 50% 30%, #0A1628 0%, #050D1A 70%)
}

/* ══════════════════════════════
   TOP SECTION
══════════════════════════════ */
#top-section{
  display:flex;
  align-items:flex-start;
  gap:8px;
  padding:8px;
  flex-shrink:0;
  height:160px
}

/* LIVE CAM BOX */
#cam-box{
  position:relative;
  width:48%;height:100%;
  border-radius:8px;
  border:2px solid #1a3a5c;
  background:#0A1628;
  overflow:hidden;
  flex-shrink:0
}
#cam-inner{
  width:100%;height:100%;
  background:linear-gradient(135deg,#0d1f35,#0a1628);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;opacity:.3
}
/* LIVE badge */
.live-badge{
  position:absolute;top:6px;left:6px;
  background:#E50000;
  color:#fff;font-family:'Orbitron',monospace;
  font-size:.48rem;font-weight:700;
  letter-spacing:1px;padding:2px 7px;
  border-radius:3px;
  animation:livePulse 1.5s ease-in-out infinite
}
@keyframes livePulse{
  0%,100%{opacity:1}50%{opacity:.6}
}
/* Channel name under cam */
.chan-name{
  position:absolute;bottom:5px;left:6px;
  font-family:'Orbitron',monospace;
  font-size:.52rem;letter-spacing:1px;
  color:rgba(255,255,255,.7)
}

/* TOP WINNERS PANEL */
#winners-panel{
  flex:1;height:100%;
  border-radius:8px;
  background:rgba(10,25,50,.85);
  border:1px solid rgba(0,200,255,.2);
  padding:7px 8px;
  display:flex;flex-direction:column;gap:4px
}
.win-title{
  font-family:'Orbitron',monospace;
  font-size:.58rem;letter-spacing:2px;
  color:#00CFFF;text-align:center;
  border-bottom:1px solid rgba(0,200,255,.2);
  padding-bottom:4px;margin-bottom:2px
}
.win-row{
  display:flex;align-items:center;gap:6px;
  padding:2px 0
}
.win-rank{
  font-family:'Orbitron',monospace;
  font-size:.58rem;color:rgba(255,255,255,.5);
  width:12px
}
.win-em{font-size:1.1rem;line-height:1}
.win-nm{
  flex:1;font-weight:700;font-size:.64rem;
  color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap
}
.win-count{
  font-family:'Orbitron',monospace;
  font-size:.58rem;color:#FFD700;
  white-space:nowrap
}

/* ══════════════════════════════
   CURRENT LEADER TAG
══════════════════════════════ */
#leader-tag{
  flex-shrink:0;
  display:flex;align-items:center;gap:6px;
  padding:4px 12px;
  background:rgba(0,0,0,.3);
  border-top:1px solid rgba(0,200,255,.1);
  border-bottom:1px solid rgba(0,200,255,.1)
}
.leader-dot{
  width:8px;height:8px;border-radius:50%;
  background:#00FF88;
  box-shadow:0 0 6px #00FF88;
  animation:ldot .8s ease-in-out infinite alternate
}
@keyframes ldot{from{opacity:.4}to{opacity:1}}
#leader-em{font-size:1.1rem}
#leader-nm{
  font-family:'Orbitron',monospace;
  font-size:.62rem;letter-spacing:1px;
  color:#FFD700;font-weight:700
}
#leader-vt{
  margin-left:auto;
  font-family:'Orbitron',monospace;
  font-size:.58rem;color:rgba(255,255,255,.5)
}
.yt-status{
  font-family:'Orbitron',monospace;
  font-size:.5rem;letter-spacing:1px;
  padding:2px 7px;border-radius:3px;
  transition:all .3s
}
.yt-status.on {color:#00FF88;border:1px solid rgba(0,255,136,.3);background:rgba(0,255,136,.08)}
.yt-status.off{color:#FF2D78;border:1px solid rgba(255,45,120,.3);background:rgba(255,45,120,.08)}
.yt-status.wait{color:#FFD700;border:1px solid rgba(255,215,0,.3);background:rgba(255,215,0,.08);animation:livePulse .8s ease-in-out infinite alternate}

/* ══════════════════════════════
   ARENA
══════════════════════════════ */
#arena-outer{
  flex:1 1 0;
  width:100%;
  display:flex;align-items:center;justify-content:center;
  min-height:0;
  position:relative
}
#arena-wrap{
  position:relative;
  flex-shrink:0
}

/* Dashed circle border like the reference */
#arena-ring{
  position:absolute;inset:0;border-radius:50%;
  border:3px dashed rgba(0,220,255,.35);
  animation:ringRot 30s linear infinite;
  pointer-events:none;z-index:2
}
@keyframes ringRot{to{transform:rotate(360deg)}}
#arena-ring2{
  position:absolute;inset:4px;border-radius:50%;
  border:1px solid rgba(0,220,255,.12);
  pointer-events:none;z-index:2
}

/* Arena background */
#arena-bg{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 50% 45%,
    rgba(0,100,200,.12) 0%,
    rgba(0,50,120,.06) 40%,
    rgba(5,13,26,.98) 68%
  );
  pointer-events:none
}

/* ══════════════════════════════
   STICKER NODES
══════════════════════════════ */
.snode{
  position:absolute;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;
  align-items:center;pointer-events:none;
  z-index:5;
  will-change:left,top
}

/* Circular emoji like flag balls in reference */
.s-ball{
  position:relative;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 35% 35%,
    rgba(255,255,255,.15) 0%, rgba(0,0,0,.3) 100%);
  box-shadow:
    0 3px 8px rgba(0,0,0,.6),
    inset 0 1px 2px rgba(255,255,255,.2);
  transition:box-shadow .1s
}
.s-em{
  font-size:clamp(1.1rem,2.5vw,1.7rem);
  line-height:1;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,.6))
}
.s-vt{
  font-family:'Orbitron',monospace;
  font-size:clamp(.32rem,.7vw,.5rem);
  color:#FFD700;font-weight:700;
  line-height:1;margin-top:1px;
  text-shadow:0 1px 3px rgba(0,0,0,.8)
}

/* Leader: gold glow */
.snode.leader .s-ball{
  box-shadow:
    0 0 0 2px rgba(255,215,0,.6),
    0 0 14px rgba(255,215,0,.5),
    0 3px 8px rgba(0,0,0,.6),
    inset 0 1px 2px rgba(255,255,255,.2)
}
.snode.leader .s-vt{color:gold}

/* Danger: red glow */
.snode.danger .s-ball{
  box-shadow:
    0 0 0 2px rgba(255,45,120,.5),
    0 0 12px rgba(255,45,120,.4),
    0 3px 8px rgba(0,0,0,.6),
    inset 0 1px 2px rgba(255,255,255,.2);
  animation:dangerBlink .4s ease-in-out infinite alternate
}
@keyframes dangerBlink{from{opacity:.7}to{opacity:1}}
.snode.danger .s-vt{color:#FF2D78}

/* Hit flash */
.snode.hit .s-ball{
  animation:hitFlash .12s ease-out
}
@keyframes hitFlash{
  0%{box-shadow:0 0 0 4px rgba(255,255,255,.8),0 0 20px rgba(255,255,255,.5)}
  100%{box-shadow:0 3px 8px rgba(0,0,0,.6),inset 0 1px 2px rgba(255,255,255,.2)}
}

/* Elimination animation */
.snode.out{
  animation:elimBall .85s ease-in forwards!important;
  z-index:4
}
@keyframes elimBall{
  0% {transform:translate(-50%,-50%) scale(1)   rotate(0);   opacity:1}
  15%{transform:translate(-50%,-50%) scale(1.4) rotate(-8deg);opacity:1}
  100%{transform:translate(-50%,300px) scale(.01) rotate(30deg);opacity:0}
}

/* Vote +1 burst */
.vburst{
  position:absolute;pointer-events:none;z-index:20;
  font-family:'Orbitron',monospace;font-size:.7rem;
  color:#00FF88;text-shadow:0 0 8px #00FF88;
  animation:vbA .7s ease-out forwards
}
@keyframes vbA{
  0%{transform:translate(-50%,-50%) scale(1.5);opacity:1}
  100%{transform:translate(-50%,-180%) scale(.3);opacity:0}
}

/* New join burst */
.joinfx{
  position:fixed;top:45%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;z-index:100;
  font-family:'Orbitron',monospace;font-size:1rem;
  color:#FFD700;text-shadow:0 0 22px #FFD700;
  animation:joinA .9s ease-out forwards;
  text-align:center;white-space:nowrap
}
@keyframes joinA{
  0%{transform:translate(-50%,-50%) scale(.2) rotate(-12deg);opacity:1}
  55%{transform:translate(-50%,-50%) scale(1.15) rotate(1deg);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:0}
}

/* ══════════════════════════════
   ELIMINATED SECTION
══════════════════════════════ */
#elim-section{
  flex-shrink:0;
  padding:5px 8px 3px;
  background:rgba(0,0,0,.4);
  border-top:1px solid rgba(255,45,120,.15)
}
.elim-title{
  font-family:'Orbitron',monospace;
  font-size:.5rem;letter-spacing:2px;
  color:#FF2D78;margin-bottom:4px;
  display:flex;align-items:center;gap:5px
}
.elim-dot{
  width:6px;height:6px;border-radius:50%;
  background:#FF2D78;flex-shrink:0
}
#elim-scroll{
  display:flex;gap:4px;overflow-x:auto;
  padding-bottom:2px;
  /* Hide scrollbar */
  scrollbar-width:none;
  -ms-overflow-style:none
}
#elim-scroll::-webkit-scrollbar{display:none}
.elim-item{
  flex-shrink:0;
  width:32px;height:32px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.1) 0%,rgba(0,0,0,.4) 100%);
  border:1px solid rgba(255,45,120,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:.95rem;
  opacity:.7;
  position:relative;
  flex-direction:column
}
/* Red X overlay on eliminated */
.elim-item::after{
  content:'✕';
  position:absolute;
  font-size:.5rem;color:rgba(255,45,120,.8);
  bottom:-1px;right:-1px;
  background:#050D1A;border-radius:50%;
  width:11px;height:11px;
  display:flex;align-items:center;justify-content:center;
  line-height:11px;text-align:center
}

/* ══════════════════════════════
   ROUND INFO BAR
══════════════════════════════ */
#round-bar{
  flex-shrink:0;
  display:flex;align-items:center;gap:5px;
  padding:3px 8px;
  background:rgba(0,0,0,.5);
  border-top:1px solid rgba(255,255,255,.05)
}
.rb{
  font-family:'Orbitron',monospace;
  font-size:.52rem;letter-spacing:1.5px;
  padding:2px 7px;border-radius:3px;
  white-space:nowrap
}
.rb-rnd{color:#FFD700;background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.22)}
.rb-phase{color:#FF6B00;background:rgba(255,107,0,.07);border:1px solid rgba(255,107,0,.25);animation:fightG .9s ease-in-out infinite alternate}
.rb-phase.brk{color:#00CFFF;background:rgba(0,200,255,.06);border:1px solid rgba(0,200,255,.2);animation:none}
@keyframes fightG{from{box-shadow:none}to{box-shadow:0 0 8px rgba(255,107,0,.4)}}
.rb-timer{color:rgba(255,255,255,.5);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1)}
.rb-alive{color:#00FF88;background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.22);margin-left:auto}

/* ══════════════════════════════
   WIN SCREEN
══════════════════════════════ */
#wscreen{
  display:none;position:fixed;inset:0;
  background:rgba(5,13,26,.97);
  z-index:200;
  flex-direction:column;align-items:center;justify-content:center;gap:10px
}
#wscreen.on{display:flex}
.cf-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.cfp{position:absolute;top:-20px;animation:cfFall linear infinite}
@keyframes cfFall{
  0%{transform:translateY(-20px) rotate(0);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:.2}
}
.w-trophy{font-size:3rem;animation:trophySpin 2s ease-in-out infinite}
@keyframes trophySpin{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.1) rotate(5deg)}}
.w-title{
  font-family:'Orbitron',monospace;font-weight:900;
  font-size:clamp(1.6rem,5vw,2.5rem);letter-spacing:6px;
  background:linear-gradient(135deg,#FFD700,#FF6B00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.w-em{font-size:clamp(4rem,12vw,6rem);animation:wemPop 1.5s ease-in-out infinite}
@keyframes wemPop{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.w-nm{
  font-family:'Orbitron',monospace;font-weight:700;
  font-size:clamp(1.1rem,3.5vw,1.8rem);letter-spacing:4px;
  color:gold;text-shadow:0 0 30px gold
}
.w-vt{color:rgba(255,255,255,.4);font-size:.82rem;font-weight:700}
.w-cta{
  font-family:'Orbitron',monospace;font-size:.7rem;
  letter-spacing:2px;color:#00CFFF;
  background:rgba(0,200,255,.08);border:1px solid rgba(0,200,255,.3);
  padding:6px 16px;border-radius:5px;
  animation:ctaG 1.5s ease-in-out infinite;text-align:center
}
@keyframes ctaG{0%,100%{box-shadow:none}50%{box-shadow:0 0 18px rgba(0,200,255,.5)}}
.w-next{
  font-family:'Orbitron',monospace;font-size:.7rem;
  letter-spacing:2px;color:rgba(255,255,255,.22)
}

/* ══════════════════════════════
   TOAST & OVERLAYS
══════════════════════════════ */
#toast{
  position:fixed;top:8px;left:50%;
  transform:translateX(-50%) translateY(-60px);
  background:rgba(5,13,26,.97);
  border:1px solid #00CFFF;border-radius:5px;
  padding:5px 14px;font-weight:700;font-size:.65rem;
  color:#00CFFF;z-index:500;white-space:nowrap;
  pointer-events:none;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1)
}
#toast.on{transform:translateX(-50%) translateY(0)}
.ms-banner{
  position:fixed;bottom:90px;left:50%;
  transform:translateX(-50%) translateY(70px);
  background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,107,0,.12));
  border:1px solid rgba(255,215,0,.4);border-radius:6px;
  padding:6px 18px;font-family:'Orbitron',monospace;
  font-size:.74rem;letter-spacing:2px;color:#FFD700;
  z-index:60;white-space:nowrap;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1)
}
.ms-banner.on{transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════
   FX
══════════════════════════════ */
.pt{
  position:fixed;border-radius:50%;pointer-events:none;
  z-index:999;animation:ptFly .6s ease-out forwards
}
@keyframes ptFly{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}
}
#hflash{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0;transition:opacity .08s}
#hflash.on{opacity:1}
</style>
</head>
<body>

<div id="root">

  <!-- TOP SECTION: CAM + WINNERS -->
  <div id="top-section">

    <!-- LIVE CAM -->
    <div id="cam-box">
      <div id="cam-inner">📹</div>
      <div class="live-badge">● LIVE</div>
      <div class="chan-name" id="chan-name">STICKER BATTLE</div>
    </div>

    <!-- TOP WINNERS -->
    <div id="winners-panel">
      <div class="win-title">TOP WINNERS</div>
      <div id="winners-list">
        <div class="win-row"><span class="win-rank">1</span><span class="win-em">—</span><span class="win-nm" style="color:rgba(255,255,255,.3)">No winner yet</span><span class="win-count"></span></div>
      </div>
    </div>

  </div>

  <!-- CURRENT LEADER -->
  <div id="leader-tag">
    <div class="leader-dot"></div>
    <span id="leader-em">—</span>
    <span id="leader-nm">WAITING...</span>
    <span id="leader-vt">0 votes</span>
    <div class="yt-status wait" id="yt-badge">🔄 CONNECTING</div>
  </div>

  <!-- ARENA -->
  <div id="arena-outer">
    <div id="arena-wrap">
      <div id="arena-bg"></div>
      <div id="arena-ring"></div>
      <div id="arena-ring2"></div>
    </div>
  </div>

  <!-- ROUND BAR -->
  <div id="round-bar">
    <div class="rb rb-rnd"   id="t-round">ROUND 1</div>
    <div class="rb rb-phase" id="t-phase">⚔ BATTLE</div>
    <div class="rb rb-timer" id="t-timer">1:30</div>
    <div class="rb rb-alive" id="t-alive">🟢 20</div>
  </div>

  <!-- ELIMINATED -->
  <div id="elim-section">
    <div class="elim-title"><div class="elim-dot"></div>ELIMINATED</div>
    <div id="elim-scroll"></div>
  </div>

</div>

<!-- WIN SCREEN -->
<div id="wscreen">
  <div class="cf-wrap" id="cf"></div>
  <div class="w-trophy">🏆</div>
  <div class="w-title">CHAMPION!</div>
  <div class="w-em" id="w-em">🎉</div>
  <div class="w-nm" id="w-nm">—</div>
  <div class="w-vt" id="w-vt">0 votes</div>
  <div class="w-cta">🎭 SEND STICKER FOR NEXT ROUND!</div>
  <div class="w-next" id="w-next">Next round in 8…</div>
</div>

<div id="hflash"></div>
<div id="toast"></div>
<div class="ms-banner" id="ms">🎉 Amazing!</div>

<script src="/socket.io/socket.io.js"></script>
<script>
'use strict';

/* ══════════════════════════════
   STICKER LIST — 20 fighters
══════════════════════════════ */
const STICKERS = [
  {e:'😂',n:'LOL'},    {e:'😍',n:'Love'},   {e:'🔥',n:'Fire'},
  {e:'💀',n:'Skull'},  {e:'👻',n:'Ghost'},  {e:'🤖',n:'Robot'},
  {e:'👑',n:'King'},   {e:'🦁',n:'Lion'},   {e:'🐯',n:'Tiger'},
  {e:'🐺',n:'Wolf'},   {e:'🦊',n:'Fox'},    {e:'🐉',n:'Dragon'},
  {e:'🦄',n:'Unicorn'},{e:'🚀',n:'Rocket'}, {e:'💎',n:'Diamond'},
  {e:'⚡',n:'Thunder'},{e:'🌟',n:'Star'},   {e:'🎯',n:'Target'},
  {e:'🏆',n:'Trophy'}, {e:'🤩',n:'StarFace'}
];

const EXTRA_NAMES = {
  '😀':'Grin','😎':'Cool','🥳':'Party','🤠':'Cowboy','🎃':'Pumpkin',
  '🐱':'Cat','🐶':'Dog','🐸':'Frog','🐻':'Bear','👽':'Alien',
  '🎮':'Gamer','💪':'Strong','🍕':'Pizza','🌈':'Rainbow','🦋':'Butterfly',
  '❤️':'Heart','💯':'100','🎵':'Music','😱':'Shock','🤯':'Mindblown',
  '😏':'Smirk','🥶':'Frozen','😈':'Devil','🤑':'Money','🤬':'Angry',
  '🐧':'Penguin','🦅':'Eagle','🐬':'Dolphin','🦈':'Shark','🦉':'Owl'
};

/* ══════════════════════════════
   CONSTANTS
══════════════════════════════ */
const ROUND_S    = 90;
const WIN_AUTO   = 8;
const ELIM_EVERY = 8;
const MAX_ARENA  = 20;
const BASE_SPEED = 1.4;
const BALL_R     = 22;  // radius for collision

/* ══════════════════════════════
   STATE
══════════════════════════════ */
let fighters   = [];
let eliminated = [];
let allWinners = [];  // history
let gameNum    = 0;
let phase      = 'idle';
let elimClock  = ELIM_EVERY;
let roundLeft  = ROUND_S;
let winLeft    = WIN_AUTO;
let _tick      = null;
let _raf       = null;
let aR=0, CX=0, CY=0;
let _fq        = {};
let _totalVotes = 0;
let _fid       = 0;
const MS_LVLS  = [10,25,50,100,200,500];
let _msIdx     = 0;

/* ══════════════════════════════
   EMOJI UTILS
══════════════════════════════ */
const _seg = (typeof Intl!=='undefined'&&Intl.Segmenter)
  ? new Intl.Segmenter([],{granularity:'grapheme'}) : null;
function graphemes(s){return _seg?[..._seg.segment(s)].map(x=>x.segment):[...s]}
function norm(s){return(s||'').replace(/\uFE0F/g,'').replace(/\u20E3/g,'').trim()}
function firstEmoji(s){
  for(const g of graphemes(s)){
    const cp=g.codePointAt(0);
    if(!cp||cp<=127)continue;
    if(cp>=0x1F300||(cp>=0x2600&&cp<=0x27BF))return g;
  }
  return null;
}
function emojiName(e){
  const found=STICKERS.find(x=>norm(x.e)===norm(e));
  if(found)return found.n;
  return EXTRA_NAMES[e]||EXTRA_NAMES[norm(e)]||'Fighter';
}

/* ══════════════════════════════
   ARENA SIZING
══════════════════════════════ */
function sizeArena(){
  const outer = document.getElementById('arena-outer');
  const wrap  = document.getElementById('arena-wrap');
  const rect  = outer.getBoundingClientRect();
  const side  = Math.min(rect.width, rect.height) - 4;
  wrap.style.width  = side+'px';
  wrap.style.height = side+'px';
  aR = side/2 - 8;
  CX = side/2;
  CY = side/2;
}

/* ══════════════════════════════
   BALL SIZE based on arena
══════════════════════════════ */
function ballSize(){
  // ~12% of arena radius
  return Math.max(28, Math.min(44, aR * 0.13));
}

/* ══════════════════════════════
   INIT GAME
══════════════════════════════ */
function initGame(){
  sizeArena();
  fighters    = [];
  eliminated  = [];
  _fid        = 0;
  _totalVotes = 0;
  _msIdx      = 0;
  _fq         = {};
  gameNum++;
  elimClock   = ELIM_EVERY;
  roundLeft   = ROUND_S;
  phase       = 'game';

  const chosen = [...STICKERS].sort(()=>Math.random()-.5);
  chosen.forEach((s, i) => {
    const ang = (i/chosen.length)*Math.PI*2 + (Math.random()-.5)*.2;
    const r   = aR*(0.18+(i%4)*0.14+Math.random()*.08);
    const dir = Math.random()*Math.PI*2;
    const spd = BASE_SPEED*(0.85+Math.random()*.3);
    fighters.push({
      id:`f${_fid++}`, e:s.e, n:s.n, votes:0, alive:true,
      x:CX+r*Math.cos(ang), y:CY+r*Math.sin(ang),
      vx:Math.cos(dir)*spd, vy:Math.sin(dir)*spd
    });
  });

  document.getElementById('t-round').textContent=`ROUND ${gameNum}`;
  setPhase('game');
  document.querySelectorAll('.snode,.vburst,.joinfx').forEach(e=>e.remove());
  document.getElementById('elim-scroll').innerHTML='';

  fighters.forEach(mkNode);
  updAlive(); updLeader();
  clearInterval(_tick);_tick=setInterval(tick,1000);
  cancelAnimationFrame(_raf);loop();
  startBg();
}

/* ══════════════════════════════
   CREATE DOM NODE
══════════════════════════════ */
function mkNode(f){
  const wrap = document.getElementById('arena-wrap');
  const bs   = ballSize();
  const el   = document.createElement('div');
  el.className = 'snode';
  el.id        = `n-${f.id}`;
  el.innerHTML = `
    <div class="s-ball" style="width:${bs}px;height:${bs}px">
      <span class="s-em">${f.e}</span>
    </div>
    <span class="s-vt">—</span>
  `;
  el.style.left = f.x+'px';
  el.style.top  = f.y+'px';
  wrap.appendChild(el);
}

/* ══════════════════════════════
   PHYSICS LOOP — optimized
══════════════════════════════ */
function loop(){
  if(phase==='game'){
    const alive = fighters.filter(f=>f.alive);
    const bs    = ballSize();
    const R     = bs/2 + 2;  // dynamic radius

    // Move + wall
    for(const f of alive){
      f.x+=f.vx; f.y+=f.vy;
      const dx=f.x-CX, dy=f.y-CY, d=Math.sqrt(dx*dx+dy*dy);
      if(d+R>aR){
        const nx=dx/d,ny=dy/d,dot=f.vx*nx+f.vy*ny;
        if(dot>0){f.vx-=2*dot*nx;f.vy-=2*dot*ny;}
        const ov=d+R-aR;f.x-=nx*ov;f.y-=ny*ov;
      }
    }

    // Collisions
    const md=R*2;
    for(let i=0;i<alive.length;i++){
      for(let j=i+1;j<alive.length;j++){
        const a=alive[i],b=alive[j];
        const dx=b.x-a.x,dy=b.y-a.y;
        const d2=dx*dx+dy*dy;
        if(d2<md*md&&d2>.01){
          const d=Math.sqrt(d2);
          const nx=dx/d,ny=dy/d;
          const p=(a.vx-b.vx)*nx+(a.vy-b.vy)*ny;
          if(p>0){
            a.vx-=p*nx;a.vy-=p*ny;
            b.vx+=p*nx;b.vy+=p*ny;
            flashHit(a.id);flashHit(b.id);
          }
          const ov=(md-d)/2;
          a.x-=nx*ov;a.y-=ny*ov;
          b.x+=nx*ov;b.y+=ny*ov;
        }
      }
    }

    // Min speed + update DOM
    for(const f of alive){
      const sp=Math.sqrt(f.vx*f.vx+f.vy*f.vy);
      if(sp<BASE_SPEED*.4){const sc=BASE_SPEED*.6/(sp||1);f.vx*=sc;f.vy*=sc;}
      const el=document.getElementById(`n-${f.id}`);
      if(el&&!el.classList.contains('out')){
        el.style.left=f.x+'px';
        el.style.top =f.y+'px';
      }
    }
    refreshNodes(alive);
  }
  _raf=requestAnimationFrame(loop);
}

function flashHit(id){
  if(_fq[id])return;_fq[id]=true;
  const el=document.getElementById(`n-${id}`);
  if(el){
    el.classList.add('hit');
    setTimeout(()=>{el.classList.remove('hit');delete _fq[id];},115);
  }
}

function refreshNodes(alive){
  if(!alive.length)return;
  const maxV=Math.max(...alive.map(f=>f.votes));
  const minV=Math.min(...alive.map(f=>f.votes));
  for(const f of alive){
    const el=document.getElementById(`n-${f.id}`);
    if(!el||el.classList.contains('out'))continue;
    el.classList.toggle('leader',f.votes===maxV&&f.votes>0);
    el.classList.toggle('danger',f.votes===minV&&alive.length>1);
    el.querySelector('.s-vt').textContent=f.votes>0?`${f.votes}▲`:'—';
  }
}

/* ══════════════════════════════
   TICK
══════════════════════════════ */
function tick(){
  if(phase==='game'){
    roundLeft--;elimClock--;
    const m=Math.floor(roundLeft/60),s=roundLeft%60;
    document.getElementById('t-timer').textContent=`${m}:${s<10?'0'+s:s}`;
    if(roundLeft>0&&roundLeft<=5)sfx('warn');

    if(elimClock<=0){
      elimClock=ELIM_EVERY;
      const alive=fighters.filter(f=>f.alive);
      if(alive.length>1){
        const minV=Math.min(...alive.map(f=>f.votes));
        const pool=alive.filter(f=>f.votes===minV);
        elim(pool[Math.floor(Math.random()*pool.length)]);
      }
    }

    updAlive();updLeader();

    const alive=fighters.filter(f=>f.alive);
    if(alive.length<=1){
      clearInterval(_tick);_tick=null;
      const winner=alive[0]||fighters.slice().sort((a,b)=>b.votes-a.votes)[0];
      setTimeout(()=>showWin(winner),800);
    }
  } else if(phase==='winwait'){
    winLeft--;
    document.getElementById('w-next').textContent=`Next round in ${winLeft}…`;
    if(winLeft<=0){
      document.getElementById('wscreen').classList.remove('on');
      document.getElementById('cf').innerHTML='';
      document.querySelectorAll('.snode,.vburst,.joinfx').forEach(e=>e.remove());
      initGame();
    }
  }
}

/* ══════════════════════════════
   ELIMINATE
══════════════════════════════ */
function elim(f){
  f.alive=false;sfx('elim');
  eliminated.push(f);
  addElimItem(f);

  const el=document.getElementById(`n-${f.id}`);
  if(el){spawnPts(el);el.classList.add('out');setTimeout(()=>el.remove(),900);}
  toast(`💥 ${f.e} ${f.n} chiqarildi!`);
  updAlive();
}

function addElimItem(f){
  const scroll=document.getElementById('elim-scroll');
  const item=document.createElement('div');
  item.className='elim-item';
  item.title=f.n;
  item.textContent=f.e;
  scroll.appendChild(item);
  // Auto scroll to right
  setTimeout(()=>{scroll.scrollLeft=scroll.scrollWidth;},50);
}

/* ══════════════════════════════
   WIN
══════════════════════════════ */
function showWin(f){
  if(!f)return;
  cancelAnimationFrame(_raf);_raf=null;
  sfx('win');

  // Add to winners history
  allWinners.unshift({e:f.e,n:f.n,votes:f.votes});
  if(allWinners.length>3)allWinners=allWinners.slice(0,3);
  updWinners();

  document.getElementById('w-em').textContent=f.e;
  document.getElementById('w-nm').textContent=f.n.toUpperCase();
  document.getElementById('w-vt').textContent=`${f.votes} votes — CHAMPION!`;
  winLeft=WIN_AUTO;
  document.getElementById('w-next').textContent=`Next round in ${winLeft}…`;
  document.getElementById('wscreen').classList.add('on');
  spawnConfetti();phase='winwait';
  clearInterval(_tick);_tick=setInterval(tick,1000);
}

function updWinners(){
  const list=document.getElementById('winners-list');
  if(!allWinners.length)return;
  list.innerHTML=allWinners.slice(0,3).map((w,i)=>`
    <div class="win-row">
      <span class="win-rank">${i+1}</span>
      <span class="win-em">${w.e}</span>
      <span class="win-nm">${w.n}</span>
      <span class="win-count">${w.votes}V</span>
    </div>`).join('');
}

/* ══════════════════════════════
   VOTE — FAQAT EMOJI
══════════════════════════════ */
function vote(raw){
  if(phase!=='game')return;
  if(!raw||!raw.trim())return;

  const emoji=firstEmoji(raw);
  if(!emoji)return; // Matn — e'tiborsiz

  _totalVotes++;
  const match=findF(emoji,true);

  if(match){
    match.votes++;
    sfx('vote');
    voteBurst(match);
    toast(`${match.e} +1 (${match.votes} ovoz)`);
  } else {
    const dead=findF(emoji,false);
    if(dead){toast(`❌ ${dead.e} chiqarib yuborildi`);return;}
    if(fighters.filter(f=>f.alive).length<MAX_ARENA){
      const nf=addFighter(emoji);
      if(nf){nf.votes++;toast(`🆕 ${emoji} ${nf.n} KIRDI!`);}
    } else {
      toast(`⚠️ Maydon to'la!`);
    }
  }
  checkMs();updLeader();
}

function findF(emoji,aliveOnly){
  const pool=aliveOnly?fighters.filter(f=>f.alive):fighters;
  const n=norm(emoji);
  return pool.find(f=>norm(f.e)===n||f.e===emoji)||null;
}

function addFighter(emoji){
  if(fighters.filter(f=>f.alive).length>=MAX_ARENA)return null;
  if(findF(emoji,false))return null;
  const id=`f${_fid++}`,name=emojiName(emoji);
  const ang=Math.random()*Math.PI*2;
  const r=aR*(0.2+Math.random()*.45);
  const dir=Math.random()*Math.PI*2;
  const spd=BASE_SPEED*(0.85+Math.random()*.3);
  const f={id,e:emoji,n:name,votes:0,alive:true,
    x:CX+r*Math.cos(ang),y:CY+r*Math.sin(ang),
    vx:Math.cos(dir)*spd,vy:Math.sin(dir)*spd};
  fighters.push(f);mkNode(f);sfx('join');
  showJoinFx(emoji,name);
  updAlive();return f;
}

function showJoinFx(e,n){
  const b=document.createElement('div');b.className='joinfx';
  b.textContent=`${e} ${n.toUpperCase()} ENTERED!`;
  document.body.appendChild(b);setTimeout(()=>b.remove(),1000);
}

/* ══════════════════════════════
   UI UPDATES
══════════════════════════════ */
function updAlive(){
  document.getElementById('t-alive').textContent=`🟢 ${fighters.filter(f=>f.alive).length}`;
}

function updLeader(){
  const alive=fighters.filter(f=>f.alive).sort((a,b)=>b.votes-a.votes);
  const top=alive[0];
  if(top&&top.votes>0){
    document.getElementById('leader-em').textContent=top.e;

    document.getElementById('leader-em').textContent='—';
    document.getElementById('leader-nm').textContent='WAITING...';
    document.getElementById('leader-vt').textContent='0 votes';
  }
}

function setPhase(p){

  else{el.textContent='⏸ BREAK';el.className='rb rb-phase brk';}
}

/* ══════════════════════════════
   SOCKET — YOUTUBE LIVE
══════════════════════════════ */
function connectSocket(){
  const badge=document.getElementById('yt-badge');
  if(typeof io==='undefined'){
    badge.textContent='⚠️ NO SERVER';badge.className='yt-status off';return;
  }
  const socket=io({transports:['websocket','polling'],reconnection:true,reconnectionDelay:2000,reconnectionAttempts:Infinity});
  socket.on('connect',()=>{badge.textContent='🟢 YT LIVE';badge.className='yt-status on';});
  socket.on('disconnect',()=>{badge.textContent='🔄 RECONNECTING';badge.className='yt-status wait';});
  socket.on('yt_status',data=>{
    const s=data.status;
    if(s==='CONNECTED'){badge.textContent='🟢 YT LIVE';badge.className='yt-status on';toast('✅ YouTube chat ulandi!');}
    else if(s==='CONNECTING'){badge.textContent='🔄 CONNECTING';badge.className='yt-status wait';}
    else if(s==='ERROR'){badge.textContent='⚠️ XATO';badge.className='yt-status off';}
    else if(s==='NOT_LIVE'){badge.textContent='⏸ NOT LIVE';badge.className='yt-status off';}
    else if(s==='NO_VIDEO_ID'){badge.textContent='⚠️ NO ID';badge.className='yt-status off';toast('⚠️ .env ga VIDEO_ID qo\'shing!');}
    else if(s==='STREAM_ENDED'){badge.textContent='🏁 ENDED';badge.className='yt-status off';}
  });
  ['vote','chat','comment','message'].forEach(ev=>{
    socket.on(ev,data=>{
      const raw=data.emoji||data.text||data.message||data.comment||data.displayMessage||'';
      if(raw)vote(raw);
    });
  });
}

/* ══════════════════════════════
   AUDIO
══════════════════════════════ */
let AC=null,bgInt=null,audioReady=false;
function initAudio(){
  if(audioReady)return;
  try{AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();audioReady=true;startBg();}catch(e){}
}
function startBg(){
  if(bgInt||!AC)return;
  const comp=AC.createDynamicsCompressor();comp.threshold.value=-14;comp.ratio.value=4;comp.connect(AC.destination);
  const M=AC.createGain();M.gain.value=0.06;M.connect(comp);
  const BPM=132,B=60/BPM,E=B/2;
  const MEL=[659,E,784,E,880,B,784,E,659,E,587,E,659,E,784,B,587,B,698,E,784,E,880,B,698,E,784,E,659,E,523,E,440,B,523,B];
  const BAS=[130,B*2,196,B*2,174,B*2,220,B*2,130,B*2,174,B*2,196,B*2,110,B*2];
  let loopLen=0;for(let i=0;i<MEL.length;i+=2)loopLen+=MEL[i+1];
  let t0=AC.currentTime+0.05;
  function n(f,d,tp,vol,t){const o=AC.createOscillator(),g=AC.createGain();o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);g.gain.setValueAtTime(vol*.75,t+d*.55);g.gain.linearRampToValueAtTime(0,t+d*.9);o.connect(g);g.connect(M);o.start(t);o.stop(t+d);}
  function kk(t){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(155,t);o.frequency.exponentialRampToValueAtTime(40,t+0.09);g.gain.setValueAtTime(0.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.11);o.connect(g);g.connect(M);o.start(t);o.stop(t+0.12);}
  function hh(t,v){try{const buf=AC.createBuffer(1,AC.sampleRate*.04,AC.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*.8;const s=AC.createBufferSource(),g=AC.createGain();g.gain.value=v||.035;s.buffer=buf;s.connect(g);g.connect(M);s.start(t);}catch(e){}}
  function sched(){let t=t0;for(let i=0;i<MEL.length;i+=2){n(MEL[i],MEL[i+1],'square',.14,t);t+=MEL[i+1];}t=t0;for(let i=0;i<BAS.length;i+=2){n(BAS[i],BAS[i+1],'sine',.25,t);t+=BAS[i+1];}const bars=Math.ceil(loopLen/(B*4));for(let b=0;b<bars;b++){const bt=t0+b*B*4;kk(bt);kk(bt+B*2);hh(bt+B,.07);hh(bt+B*3,.07);for(let h=0;h<8;h++)hh(bt+h*E);}t0+=loopLen;}
  sched();bgInt=setInterval(sched,loopLen*1000);
}
function stopBg(){if(!bgInt)return;clearInterval(bgInt);bgInt=null;}
function sfx(type){
  if(!AC)return;
  try{
    if(type==='vote'){const o=AC.createOscillator(),g=AC.createGain();o.type='triangle';o.frequency.value=1300;g.gain.setValueAtTime(.04,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.055);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+.06);}
    if(type==='elim'){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(500,AC.currentTime);o.frequency.exponentialRampToValueAtTime(60,AC.currentTime+.18);g.gain.setValueAtTime(.3,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.2);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+.22);}
    if(type==='join'){const o=AC.createOscillator(),g=AC.createGain();o.type='square';o.frequency.setValueAtTime(440,AC.currentTime);o.frequency.exponentialRampToValueAtTime(880,AC.currentTime+.14);g.gain.setValueAtTime(.09,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.18);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+.2);}
    if(type==='warn'){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=440;g.gain.setValueAtTime(.1,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.1);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+.11);}
    if(type==='win'){stopBg();const M=AC.createGain();M.gain.value=.13;M.connect(AC.destination);[523,659,784,1047,1319].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.type='square';o.frequency.value=f;const t=AC.currentTime+i*.13;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.5,t+.04);g.gain.linearRampToValueAtTime(0,t+.13);o.connect(g);g.connect(M);o.start(t);o.stop(t+.15);});}
  }catch(e){}
}
